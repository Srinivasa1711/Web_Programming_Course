<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Styles</title>
        <style>
            #foo {
                color: orange;
                text-align: center;
            }
            .boo {
                color: blue;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <h1 id="foo">heading 1</h1>
        <h1 class="boo">heading 2</h1>
        <h1>heading 3</h1>
    </body>
</html>

<!-- Specifity
 1. inline 
 2. id
 3. class
 4. type-->

 <!-- CSS Selectors
  a,b -- Multiple Element Selector
  a b -- Descendant Selector
  a > b -- child Selector
  a + b -- Adjacent Sibling Selector
  [a=b] -- Attribute Selector
  a : b -- Pseudoclass Selector-->
