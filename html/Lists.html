<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Lists</title>
    </head>
    <body>
        An Ordered Lists: 
        <ol>
            <li>First Item</li> <!--It will add numbers by default like 1,2,3...-->
            <li>Second Item</li>
            <li>Third Item</li>
        </ol>
        <ul>
            An Unordered Lists:
            <li>First Item</li> <!--It will add bullet points by default like ...-->
            <li>Second Item</li>
            <li>Third Item</li>
        </ul>
    </body>
</html>
